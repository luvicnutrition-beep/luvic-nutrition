@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

:root {
    --neon-green: #00ff9f;
    --neon-pink: #ff00cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),

}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 20px;
    text-align: center;
}

/* TOPO */
.top-cta {
    display: flex;
    gap: 25px;
    margin-bottom: 40px;
    flex-wrap: wrap;
}

.top-cta a { flex: 1; }

.top-cta img {
    width: 100%;
    border-radius: 20px;
    box-shadow: 0 0 40px rgba(0,255,159,0.3);
    transition: 0.3s;
}

.top-cta a:hover img {
    transform: scale(1.03);
    box-shadow: 0 0 60px var(--neon-green),
                0 0 100px var(--neon-pink);
}

/* HEADLINE */
h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    font-weight: 900;
    background: linear-gradient(90deg, var(--neon-green), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    font-size: 1.1rem;
    color: #ccc;
    margin-bottom: 40px;
}

/* LAYOUT */
.main-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

/* IMAGENS LATERAIS */
.side-img img {
    max-width: 260px;
    width: 100%;
    border-radius: 18px;
    box-shadow: 0 0 50px rgba(255,0,204,0.4);
}

/* BOTÕES */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 18px;
    max-width: 420px;
    width: 100%;
}

.btn {
    width: 100%;
    padding: 20px;
    font-size: 1.2rem;
    font-weight: 800;
    border-radius: 50px;
    text-decoration: none;
    color: #fff;
}

/* WHATS */
.btn-whatsapp {
    background: #25D366;
    border: 3px solid var(--neon-green);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 20px #25D366; }
    50% { box-shadow: 0 0 40px #00ff9f; }
    100% { box-shadow: 0 0 20px #25D366; }
}

.whats-info {
    font-size: 0.9rem;
    color: #aaa;
}

/* EBOOK */
.btn-comprar {
    border: 3px solid var(--neon-pink);
    box-shadow: 0 0 25px var(--neon-pink);
}

.btn-comprar:hover {
    background: var(--neon-pink);
    color: #000;
}

/* LOJA */
.btn-loja {
    border: 2px solid #777;
}

/* RESPONSIVO */
@media(max-width: 900px){
    .main-content {
        flex-direction: column;
    }
}
