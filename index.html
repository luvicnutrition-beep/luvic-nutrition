<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

:root {
    --neon-green: #00ff9f;
    --neon-pink: #ff00cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.9)),
                url('https://raw.githubusercontent.com/LuanFaria/luvic.nutrition/refs/heads/main/FUNDO.png') center/cover no-repeat;
    color: #fff;
}

/* CONTAINER CENTRAL */
.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;

    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* IMAGEM */
.top-cta {
    margin-bottom: 25px;
}

.top-cta img {
    width: 100%;
    max-width: 420px;
    border-radius: 20px;
    transition: 0.3s;
    box-shadow: 0 0 40px rgba(0,255,159,0.25);
}

.top-cta a:hover img {
    transform: scale(1.05);
    box-shadow:
        0 0 60px var(--neon-green),
        0 0 120px var(--neon-pink);
}

/* HEADLINE */
h1 {
    font-size: 2.3rem;
    margin-bottom: 10px;
    font-weight: 900;
    background: linear-gradient(90deg, var(--neon-green), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* SUB */
.sub {
    font-size: 1.05rem;
    color: #ccc;
    margin-bottom: 25px;
}

/* BOTÃO */
.btn-whatsapp {
    display: inline-block;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    padding: 18px 25px;
    font-size: 1.2rem;
    font-weight: 900;
    border-radius: 50px;
    text-decoration: none;
    color: #fff;
    background: #25D366;
    border: 3px solid var(--neon-green);
    animation: pulse 1.5s infinite;
}

/* ANIMAÇÃO */
@keyframes pulse {
    0% { box-shadow: 0 0 20px #25D366; }
    50% { box-shadow: 0 0 45px #00ff9f; }
    100% { box-shadow: 0 0 20px #25D366; }
}

/* MOBILE */
@media(max-width: 480px){
    h1 {
        font-size: 1.8rem;
    }

    .container {
        padding: 30px 15px;
    }

    .btn-whatsapp {
        font-size: 1.1rem;
        padding: 16px;
    }
}
